spring:
  threads:
    virtual:
      enabled: true 
  r2dbc:
    # 1. Simplified URL (No credentials inside the URL string)
    url: ${DB_URL}
    
    # 2. Clear Username with the required Supabase project suffix
    username: ${DB_USERNAME}
    
    # 3. Clear Password (YAML handles the # fine here)
    password: ${DB_PASSWORD}
    
    properties:
      sslMode: "verify-ca"
      # This file path is confirmed correct 
      sslRootCert: "/Users/arjunkvarkey/transparent-kitchen/kitchen-api/src/main/resources/prod-ca-2021.crt"
    pool:
      max-size: 10